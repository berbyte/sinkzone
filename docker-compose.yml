version: '3.8'

services:
  sinkzone:
    build: .
    container_name: sinkzone
    network_mode: host
    volumes:
      - ~/.sinkzone:/home/sinkzone/.sinkzone
    environment:
      - TZ=UTC
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nslookup", "google.com", "127.0.0.1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
