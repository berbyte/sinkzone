version: 2

before:
  hooks:
    # You may remove this if you don't use go modules.
    - go mod tidy
    # you may remove this if you don't need go generate
    - go generate ./...

builds:
  - id: sinkzone
    env:
      - CGO_ENABLED=1
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}
    binary: sinkzone
    hooks:
      post:
        - cmd: chmod +x {{ .Path }}
          env:
            - CGO_ENABLED=1

archives:
  - id: sinkzone
    format: tar.gz
    # this name template makes the OS and Arch compatible with the results of `uname`.
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    # use zip for windows archives
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE
      - install.sh
    ignore:
      - goos: windows
        goarch: arm64

checksum:
  name_template: 'checksums.txt'

snapshot:
  name_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

dockers:
  - image_templates:
      - "ghcr.io/berbyte/sinkzone:{{ .Version }}"
      - "ghcr.io/berbyte/sinkzone:v{{ .Major }}.{{ .Minor }}"
      - "ghcr.io/berbyte/sinkzone:latest"
    dockerfile: Dockerfile
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--platform=linux/arm64"
    extra_files:
      - README.md
      - LICENSE

brews:
  - name: sinkzone
    homepage: "https://github.com/berbyte/sinkzone"
    description: "A strict DNS filter to help you stay focused — or keep your kids safe"
    repository:
      owner: berbyte
      name: tap
    commit_author:
      name: goreleaserbot
      email: goreleaser@carlosbecker.com
    folder: Formula
    homepage: "https://github.com/berbyte/sinkzone"
    test: |
      system "#{bin}/sinkzone", "--help"
    install: |
      bin.install "sinkzone"
    dependencies:
      - "sqlite3"
    commit_msg_template: "Bump {{ .ProjectName }} to {{ .Tag }}"

nfpms:
  - id: sinkzone
    maintainer: "Berbyte <berbyte@example.com>"
    description: "A strict DNS filter to help you stay focused — or keep your kids safe"
    homepage: "https://github.com/berbyte/sinkzone"
    license: "MIT"
    formats:
      - deb
      - rpm
    bindir: /usr/local/bin
    files:
      "install.sh": "/usr/local/bin/sinkzone-install"
    scripts:
      postinstall: scripts/postinstall.sh
      postremove: scripts/postremove.sh

release:
  draft: false
  prerelease: false
  name_template: '{{ .ProjectName }} {{ .Version }}'
  footer: |
    ## Installation

    ### macOS
    ```bash
    brew install berbyte/tap/sinkzone
    ```

    ### Linux
    ```bash
    curl -sSL https://sinkzone.ber.run/install.sh | sudo bash
    ```

    ### Docker
    ```bash
    docker run --net=host ghcr.io/berbyte/sinkzone:latest dns start
    ```

    ### Manual Installation
    Download the appropriate binary for your platform and run:
    ```bash
    sudo ./sinkzone dns start
    ```