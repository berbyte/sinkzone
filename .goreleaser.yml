version: 2

project_name: sinkzone

force_token: github

before:
  hooks:
    - go mod download

builds:
  - binary: sinkzone
    env:
      - CGO_ENABLED=0
    goarch:
      - amd64
      - arm64
    goos:
      - darwin
      - linux
      - windows
    flags:
      - -trimpath

archives:
  - name_template: "{{ .ProjectName }}-{{ .Os }}-{{ .Arch }}"
    formats:
      - binary

checksum:
  name_template: checksums.txt

changelog:
  use: github

brews:
  - name: sinkzone
    description: A strict DNS filter to help you stay focused — or keep your kids safe
    homepage: https://github.com/berbyte/sinkzone
    license: MIT
    repository:
      owner: berbyte
      name: homebrew-tap
      token: "{{ .Env.GH_PAT }}"
