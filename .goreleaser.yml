version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}
    binary: sinkzone

archives:
  - name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    files:
      - README.md
      - LICENSE
      - docs/sinkzone.1

checksum:
  name_template: 'checksums.txt'

# Native packages
nfpms:
  - maintainer: "dOMiNiS <dominis@ber.run>"
    description: "DNS-based productivity tool"
    homepage: "https://github.com/berbyte/sinkzone"
    license: "MIT"
    formats:
      - deb
      - rpm
      - apk
      - archlinux
    contents:
      - src: dist/{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}*/{{ .Binary }}
        dst: /usr/local/bin/{{ .Binary }}
      - src: dist/{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}*/docs/sinkzone.1
        dst: /usr/local/share/man/man1/sinkzone.1

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - Merge pull request
      - Merge branch

homebrew_casks:
  - name: sinkzone
    homepage: "https://github.com/berbyte/sinkzone"
    description: "A strict DNS filter to help you stay focused — or keep your kids safe"
    repository:
      owner: berbyte
      name: homebrew-ber
      branch: main
      token: "{{ .Env.GH_PAT }}"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    url:
      template: "https://github.com/berbyte/sinkzone/releases/download/v{{ .Version }}/{{ .ArtifactName }}"
    commit_msg_template: "Update {{ .ProjectName }} to v{{ .Version }}"


# Docker images
dockers:
  - image_templates:
      - "ghcr.io/{{ .Env.GITHUB_REPOSITORY }}:{{ .Version }}"
      - "ghcr.io/{{ .Env.GITHUB_REPOSITORY }}:latest"
    dockerfile: Dockerfile
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--platform=linux/arm64"
    extra_files:
      - docs/sinkzone.1

release:
  name_template: 'v{{ .Version }}'
  draft: false
  prerelease: false 